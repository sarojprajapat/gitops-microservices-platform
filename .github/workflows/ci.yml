name: Build, Scan and Push Image

# Ye batata hai kab ye pipeline automatically chalegi
on:
  push:
    branches:
      - main          # jab bhi "main" branch pe push ho, ye pipeline trigger hogi

jobs:
  build-scan-push:
    runs-on: ubuntu-latest    # GitHub ka free Linux machine use hoga isse chalane ke liye

    # Zaroori permission — taaki ye job GitHub Container Registry me image push kar sake
    permissions:
      contents: write
      packages: write

    steps:
      # Step 1: Repo ka code is machine pe copy karo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: GitHub Container Registry (GHCR) me login karo
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}              # tumhara GitHub username, automatic
          password: ${{ secrets.GITHUB_TOKEN }}       # GitHub khud provide karta, kuch setup nahi chahiye

      # Step 3: Docker image build karo
      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/myapi:${{ github.sha }} .

      # Step 4: Trivy se image scan karo (security check)
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/myapi:${{ github.sha }}
          format: table
          exit-code: 0          # abhi ke liye 0 rakha — matlab CRITICAL milne pe bhi pipeline fail nahi hogi (aage hum 1 kar sakte, taaki fail ho jaye)
          severity: CRITICAL,HIGH

      # Step 5: Image ko registry pe push karo (taaki cluster wahan se pull kar sake)
      - name: Push image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/myapi:${{ github.sha }}

      # Step 6: values.yaml me naya image tag likh do (CD ka core step)
      - name: Update Helm values with new image tag
        run: |
          sed -i "s|repository:.*|repository: ghcr.io/${{ github.repository_owner }}/myapi|" myapi-chart/values.yaml
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" myapi-chart/values.yaml
          sed -i "s|pullPolicy:.*|pullPolicy: IfNotPresent|" myapi-chart/values.yaml

      # Step 7: Ye change khud commit + push karo (GitOps loop yahi se complete hota)
      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add myapi-chart/values.yaml
          git commit -m "CD: update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push
